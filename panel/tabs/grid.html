<div class="container">
    <div class="tab-content margintop20">
        <h2 class="page-header">Grid de la pagina principal</h2>
        <p>
            <button class="btn btn-primary" onclick="preparaModalAgregarGrid();">
                <span class="glyphicon glyphicon-plus"></span>
                Agregar elemento
            </button>
        </p>
        <div class="table-responsive">
            <table id="grid_tabla" class="table table-striped table-hover has-feedback" width="100%">
                <thead>
                    <tr>
                        <th></th>
                        <th>Foto</th>
                        <th>Título</th>
                        <th>Acción</th>
                        <th>Fecha</th>
                        <th></th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modal_agregar_grid" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title text-center">Agregar grid</h4>
            </div>
            <div class="modal-body">
                <form class="has-feedback" id="modal_agrega_grid_form" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="modal_agregar_cabecera">Título del grid</label>
                        <input type="text" class="form-control" id="modal_agregar_cabecera" name="titulo" placeholder="Titulo...">
                        <span class="help-block">Este campo es obligatorio</span>
                    </div>
                    <div class="form-group">
                        <label for="modal_agregar_texto">Texto del grid</label>
                        <textarea class="form-control" name="texto" id="modal_agregar_texto"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="modal_agregar_url">Acción al hacer click</label>
                        <input type="text" class="form-control" name="url" id="modal_agregar_url">
                    </div>
                    <div class="form-group">
                        <label for="modal_agregar_img">Imagen</label>
                        <input type="file" class="form-control" name="img" id="modal_agregar_img">
                        <span class="help-block">Este campo es obligatorio</span>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="agregaGrid();">Continuar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modal_modificar_grid" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title text-center">Modificar grid</h4>
            </div>
            <div class="modal-body">
                <form class="has-feedback" id="modal_modificar_grid_form" enctype="multipart/form-data">
                    <input type="hidden" id="modal_modificar_grid_id" name="id" value="-1">
                    <div class="form-group">
                        <label for="modal_modificar_cabecera">Título del grid</label>
                        <input type="text" class="form-control" id="modal_modificar_cabecera" name="titulo" placeholder="Titulo...">
                        <span class="help-block">Este campo es obligatorio</span>
                    </div>
                    <div class="form-group">
                        <label for="modal_modificar_texto">Texto del grid</label>
                        <textarea class="form-control" name="texto" id="modal_modificar_texto"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="modal_modificar_url">Acción al hacer click</label>
                        <input type="text" class="form-control" name="url" id="modal_modificar_url">
                    </div>
                    <div class="form-group">
                        <p class="info">Si no quieres modificar la imagen actual, no completes este campo</p>
                        <label for="modal_modificar_img">Imagen</label>
                        <input type="file" class="form-control" name="img" id="modal_modificar_img">
                        <span class="help-block">Este campo es obligatorio</span>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="modificarGrid();">Continuar</button>
            </div>
        </div>
    </div>
</div>
