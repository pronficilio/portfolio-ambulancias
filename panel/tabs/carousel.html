<div class="container">
    <div class="tab-content margintop20">
        <h2 class="page-header">Carousel</h2>
        <p>
            <button class="btn btn-primary" onclick="preparaModalAgregarCarousel();">
                <span class="glyphicon glyphicon-plus"></span>
                Agregar imagen
            </button>
        </p>
        <div class="table-responsive">
            <table id="carousel_tabla" class="table table-striped table-hover has-feedback" width="100%">
                <thead>
                    <tr>
                        <th></th>
                        <th>Foto</th>
                        <th></th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modal_agregar_carousel" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title text-center">Agregar a carousel</h4>
            </div>
            <div class="modal-body">
                <form class="has-feedback" id="modal_agrega_carousel_form" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="modal_agregar_carousel_img">Imagen</label>
                        <input type="file" class="form-control" name="img" id="modal_agregar_carousel_img">
                        <span class="help-block">Este campo es obligatorio</span>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="agregaCarousel();">Continuar</button>
            </div>
        </div>
    </div>
</div>
