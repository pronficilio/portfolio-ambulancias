<div class="container">
    <h1 class="page-header">Carritos</h1>
    <div>
        <ul class="nav nav-tabs" role="tablist" id="subtab_carritos">
            <li role="presentation" class="hidden">
                <a href="#carritos_crear" role="tab" data-toggle="tab">Crear carrito</a>
            </li>
            <li role="presentation" class="active">
                <a href="#carritos_listaA" role="tab" data-toggle="tab">Lista de carritos abiertos</a>
            </li>
            <li role="presentation">
                <a href="#carritos_listaC" role="tab" data-toggle="tab">Lista de carritos cerrados</a>
            </li>
        </ul>
        <div class="tab-content margintop20">
            <div role="tabpanel" class="tab-pane active" id="carritos_listaA">
                <h3>Carritos abiertos
                    <small onclick="tourCarritosAbiertos();" role="button"><i class="glyphicon glyphicon-question-sign"></i></small>
                </h3>
                <br>
                <table id="carritos_tabla_listaA" class="table table-striped table-hover" width="100%" style="background:white;">
                    <thead>
                        <tr>
                            <th><span class='_tool' title='Número de pedido' data-toggle='tooltip'><span class="glyphicon glyphicon-barcode"></span></span></th>
                            <th>Cliente</th>
                            <th>Total</th>
                            <th></th>
                        </tr>
                    </thead>
                </table>
            </div>
            <div role="tabpanel" class="tab-pane" id="carritos_listaC">
                <h3>Carritos abiertos
                    <small onclick="tourCarritosCerrados();" role="button"><i class="glyphicon glyphicon-question-sign"></i></small>
                </h3>
                <br>
                <table id="carritos_tabla_listaC" class="table table-striped table-hover" width="100%" style="background: white;">
                    <thead>
                        <tr>
                            <th><span class='_tool' title='Número de pedido' data-toggle='tooltip'><span class="glyphicon glyphicon-barcode"></span></span></th>
                            <th>Cliente</th>
                            <th>Vendedor</th>
                            <th>Facturación</th>
                            <th>Total</th>
                            <th></th>
                        </tr>
                    </thead>
                </table>
            </div>
            <div role="tabpanel" class="tab-pane" id="carritos_crear">
                <div class="row margintop20">
                    <div class="col-md-offset-3 col-md-2">
                        <label class="control-label">* Cliente:</label>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <input type="text" class="form-control" id="carrito_busca_cliente" placeholder="Escribe para buscar...">
                            <input type="hidden" id="carrito_auto_cliente" value="">
                            <div class="input-group-addon"><span class="glyphicon glyphicon-search"></span></div>
                        </div>
                    </div>
                </div>
                <div class="row margintop20">
                    <div class="col-md-offset-3 col-md-2">
                        <label for="busca_producto_carrito" class="control-label">Agrega producto</label>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <input type="text" class="form-control" id="busca_producto_carrito" placeholder="Escribe para buscar...">
                            <input type="hidden" id="nuevo_carrito_producto">
                            <input type="hidden" id="nuevo_carrito_precio">
                            <div class="input-group-addon"><span class="glyphicon glyphicon-search"></span></div>
                        </div>
                    </div>                    
                </div>
                <div class="row has-feedback margintop20">
                    <div class="col-md-offset-3 col-md-2">
                        <label for="nuevo_carrito_cantidad" class="control-label">Cantidad</label>
                    </div>
                    <div class="col-md-4">
                        <input type="number" min="1" id="nuevo_carrito_cantidad" class="form-control" placeholder="Cantidad">
                        <span class="help-block">Este campo es obligatorio<br></span>
                    </div>
                    <div class="col-md-offset-5 col-md-4 margintop20">
                        <button id="nuevo_carrito_agregar" class="btn btn-primary form-control" disabled onclick="agregaProductoNuevoCarrito();">Agregar al carrito</button>
                    </div>
                </div>
                <div class="row margintop20">
                    <div class="col-md-offset-3 col-md-2">
                        <label for="estado_carrito_2" class="control-label">Estado del carrito</label>
                    </div>
                    <div class="col-md-4">
                        <div class="btn-group" data-toggle="buttons" id="estado_carrito_2">
                            <label class="btn btn-primary active">
                                <input type="radio" name="options" id="nuevo_carrito_abierto" autocomplete="off" checked> Abierto
                            </label>
                            <label class="btn btn-primary">
                                <input type="radio" name="options" id="nuevo_carrito_cerrado" autocomplete="off"> Cerrado
                            </label>
                        </div>
                    </div>
                </div>
                <div class="row margintop20">
                    <table class="col-md-offset-2 col-md-8 table-striped table-hover text-center" id="nuevo_carrito_lista"></table>
                </div>
                <ol class="sr-only" id="nuevo_carrito_lista_real"></ol>
                <div class="row margintop20">
                    <div class="col-md-offset-3 col-md-2">
                        <label class="control-label" for="total_nuevo_carrito">Total:</label>
                    </div>
                    <div class="col-md-4">
                        <p class="mark"><strong>$ <span id="total_nuevo_carrito">0</span></strong></p>
                    </div>
                </div>
                <div class="row margintop20">
                    <div class="col-md-offset-3 col-md-2">
                    </div>
                    <div class="col-md-4">
                        <button id="fin_nuevo_carrito" class="btn btn-primary form-control">Guardar carrito</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
